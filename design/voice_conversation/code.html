<!DOCTYPE html>

<html class="dark" lang="it"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #131313;
        }
        .serif-text {
            font-family: 'Playfair Display', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .voice-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 40px;
        }
        .wave-bar {
            width: 4px;
            background: #ff6d33;
            border-radius: 2px;
            animation: wave-anim 1s ease-in-out infinite alternate;
        }
        @keyframes wave-anim {
            from { height: 8px; }
            to { height: 32px; }
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface selection:bg-primary-container overflow-hidden h-screen flex flex-col">

<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border border-outline-variant overflow-hidden">

</div>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">L'Italiano</span>
</div>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-high text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-container-padding relative">
<!-- Background Grain/Texture (Subtle UI depth) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAC7qDMTCL3RuDKTdMm8Q7MHhaHo94wScVS-e9hLldqMUNlA9qitiaszfr0V3siUOo7IEMYJlhXWZ4tBFaIYqemXcBLlJI-0u-sKR-O-5SfSA4T8XL8_20lrDn8Pkaj7OHaAf7H6YABYQRho60c_a508aHryPanDUXz3Tge9MG20WxtfYl2URVxEwLrtg17x5GKDWnp9zkfz4xGRVQyU0WWw85rIeOG2EXj8656EhJXdQYCRvECxBIVo8SskXR8G3jZ6hf50UzhImE');"></div>
<!-- Character Avatar with Pulse -->
<div class="relative mb-12">
<div class="absolute inset-0 rounded-full bg-primary-container/20 pulse-ring"></div>
<div class="absolute inset-0 rounded-full bg-primary-container/10 pulse-ring" style="animation-delay: 0.5s;"></div>
<div class="relative w-48 h-48 md:w-64 md:h-64 rounded-full border-4 border-primary-container/30 p-2 bg-surface-container-lowest shadow-2xl overflow-hidden">

</div>
<!-- Voice Wave Visualization Overlay -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-surface-container-high/90 backdrop-blur-md px-6 py-2 rounded-full flex items-center gap-2 border border-outline-variant">
<div class="voice-wave">
<div class="wave-bar" style="animation-delay: 0.1s; height: 12px;"></div>
<div class="wave-bar" style="animation-delay: 0.3s; height: 24px;"></div>
<div class="wave-bar" style="animation-delay: 0.5s; height: 18px;"></div>
<div class="wave-bar" style="animation-delay: 0.2s; height: 30px;"></div>
<div class="wave-bar" style="animation-delay: 0.4s; height: 14px;"></div>
</div>
</div>
</div>
<!-- Speech Text Container -->
<div class="text-center max-w-lg mb-16 space-y-6">
<div class="space-y-2">
<p class="text-primary font-label-sm text-label-sm tracking-widest uppercase">MARCO STA DICENDO...</p>
<h2 class="serif-text text-4xl md:text-5xl lg:text-6xl text-on-surface leading-tight italic">
                    "Come va la tua giornata oggi?"
                </h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">
                How is your day going today?
            </p>
</div>
<!-- Status Pill -->
<div class="mb-8 flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary-container/10 border border-primary-container/20">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-[0.2em]">In Ascolto...</span>
</div>
</main>
<!-- Contextual Control Bar (Modified Shell) -->
<div class="pb-12 px-container-padding">
<div class="max-w-md mx-auto bg-surface-container/60 backdrop-blur-xl rounded-full p-3 flex items-center justify-between border border-outline-variant shadow-2xl">
<!-- Help Button -->
<button class="flex flex-col items-center justify-center w-16 h-16 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">lightbulb</span>
<span class="font-label-sm text-[10px] mt-1">Aiuto</span>
</button>
<!-- Primary Mic Toggle -->
<button class="w-20 h-20 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-lg active:scale-90 transition-all duration-150 hover:brightness-110">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<!-- Close Button -->
<button class="flex flex-col items-center justify-center w-16 h-16 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">close</span>
<span class="font-label-sm text-[10px] mt-1">Chiudi</span>
</button>
</div>
</div>
<!-- Hidden Bottom Nav Suppressed for Transactional Intent but keeping layout structure -->
<!-- Logic: Suppressed because the user is in a focused Task-Focused session (Voice Call) -->
</body></html>
