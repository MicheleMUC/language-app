steps:
  # Build and push image using Google Cloud Buildpacks (no Dockerfile needed)
  - name: gcr.io/k8s-skaffold/pack
    id: build
    args:
      - build
      - gcr.io/$PROJECT_ID/language-app-server:$COMMIT_SHA
      - --builder=gcr.io/buildpacks/builder:v1
      - --path=server
      - --env=GOOGLE_BUILDABLE=server/src/index.ts

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    args:
      - gcloud
      - run
      - deploy
      - language-app-server
      - --image=gcr.io/$PROJECT_ID/language-app-server:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/language-app-server:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
